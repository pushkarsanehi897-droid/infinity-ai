<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #010409;
            --panel-bg: #050a15; /* Deep cinematic black */
            --accent-blue: #00e5ff;
            --accent-orange: #ff3d00;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --cinematic-gradient: linear-gradient(135deg, rgba(255, 61, 0, 0.12) 0%, rgba(5, 10, 21, 1) 50%, rgba(0, 229, 255, 0.12) 100%);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ATMOSPHERIC BACKGROUND */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255, 61, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 229, 255, 0.15) 0%, transparent 40%),
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
            z-index: -2;
            animation: atmospheric-flicker 10s infinite alternate ease-in-out;
        }

        @keyframes atmospheric-flicker {
            0% { filter: brightness(1) hue-rotate(0deg); }
            50% { filter: brightness(1.2) hue-rotate(5deg); }
            100% { filter: brightness(1) hue-rotate(-5deg); }
        }

        /* SIDEBAR */
        #sidebar {
            width: 280px;
            background: rgba(1, 4, 9, 0.98);
            border-right: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: absolute;
            height: 100%;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #sidebar.closed { transform: translateX(-280px); }

        #toggle-btn {
            position: absolute; right: -75px; top: 30px;
            background: #0d1629;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer; padding: 10px 15px;
            border-radius: 0 8px 8px 0; font-size: 10px;
            letter-spacing: 2px; font-weight: bold;
            text-transform: uppercase;
            box-shadow: 10px 0 20px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        #toggle-btn:hover { color: #fff; background: var(--accent-orange); border-color: var(--accent-orange); box-shadow: 0 0 20px var(--accent-orange); }

        .ifs-logo {
            position: absolute; top: 20px; right: 30px;
            font-size: 45px; font-weight: bold;
            filter: drop-shadow(0 0 15px var(--accent-orange));
            cursor: pointer;
        }

        .infinity-symbol {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        /* CINEMATIC CENTRAL PANEL */
        #control-panel {
            background: var(--cinematic-gradient);
            background-color: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 60px;
            width: 100%;
            max-width: 900px;
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.9),
                inset 0 0 50px rgba(255, 61, 0, 0.05),
                inset 0 0 50px rgba(0, 229, 255, 0.05);
            text-align: center;
            margin: 50px 0;
            backdrop-filter: blur(25px);
            position: relative;
            overflow: hidden;
            animation: panel-entrance 1s ease-out;
        }

        @keyframes panel-entrance {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #control-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-orange), var(--accent-blue), transparent);
            opacity: 0.8;
        }

        h1 {
            margin: 0; letter-spacing: 12px; text-transform: uppercase;
            font-size: 36px; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--accent-orange), var(--accent-blue), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            animation: fire-pulse 4s infinite linear;
        }

        .subtitle {
            font-size: 13px;
            letter-spacing: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-top: 12px;
            font-weight: 200;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            animation: subtitle-glow 3s infinite alternate;
        }

        @keyframes subtitle-glow {
            from { text-shadow: 0 0 5px var(--accent-blue); }
            to { text-shadow: 0 0 15px var(--accent-orange); }
        }

        @keyframes fire-pulse {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 10px rgba(0, 229, 255, 0.4)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 25px rgba(255, 61, 0, 0.7)); }
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 40px 0; text-align: left; }
        
        select, textarea {
            width: 100%; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; color: #fff; padding: 18px;
            outline: none; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
        }

        select option { background: #020610; color: #fff; }

        select:focus, textarea:focus {
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.15);
        }

        textarea { 
            height: 140px; grid-column: span 2; resize: none; 
            border-left: 3px solid var(--accent-orange);
            line-height: 1.6;
        }

        .primary-btn {
            width: 100%; background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 20px;
            border-radius: 18px; text-transform: uppercase;
            letter-spacing: 7px; cursor: pointer;
            transition: 0.5s; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            position: relative; overflow: hidden;
        }

        .primary-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .primary-btn:hover::after { left: 100%; }

        .primary-btn:hover {
            background: var(--accent-blue); color: #000;
            box-shadow: 0 0 50px var(--accent-blue);
            transform: translateY(-3px);
        }

        /* OUTPUT SECTION */
        #summary-page {
            margin-top: 50px; border-radius: 24px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
        }

        .summary-header {
            padding: 18px 30px; background: rgba(255, 255, 255, 0.03);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #output-tab { padding: 35px; min-height: 150px; max-height: 50vh; overflow-y: auto; text-align: left; }

        #scriptOutput {
            font-family: 'Courier New', monospace; 
            color: var(--accent-blue); 
            font-size: 15px; white-space: pre-wrap; line-height: 1.8;
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.2);
        }

        #output-tab::-webkit-scrollbar { width: 8px; }
        #output-tab::-webkit-scrollbar-thumb { background: var(--accent-orange); border-radius: 10px; }

        .copy-btn {
            background: transparent; border: 1px solid rgba(0, 229, 255, 0.5);
            color: var(--accent-blue); padding: 8px 20px;
            border-radius: 10px; font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .copy-btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 15px var(--accent-blue); }

        .creator-tag {
            position: fixed; bottom: 25px; right: 25px;
            font-size: 11px; letter-spacing: 4px; 
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.8));
        }

        /* HISTORY STYLING */
        .history-item {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 12px; cursor: pointer; color: #b0bec5; 
            transition: 0.4s; position: relative;
        }
        .history-item:hover {
            background: rgba(0, 229, 255, 0.05);
            color: var(--accent-blue);
            padding-left: 25px;
        }
        .history-item::before {
            content: '>'; position: absolute; left: 10px; opacity: 0; transition: 0.3s;
        }
        .history-item:hover::before { opacity: 1; left: 15px; }
    </style>
</head>
<body>
    <div id="sidebar" class="closed">
        <button id="toggle-btn">ARCHIVE</button>
        <div style="color: var(--accent-blue); letter-spacing: 4px; font-size: 12px; margin-bottom: 25px; margin-top: 50px; font-weight: bold;">NEURAL MEMORY</div>
        <div id="historyList" style="flex-grow:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,61,0,0.5); cursor:pointer; font-size:10px; padding: 25px; letter-spacing: 2px; text-transform: uppercase;">WIPE SYSTEM CACHE</button>
    </div>

    <div id="main-container">
        <div class="ifs-logo" onclick="location.reload()"><span class="infinity-symbol">∞</span></div>

        <div id="control-panel">
            <h1>Infinity Studios</h1>
            <div class="subtitle">Intelligent Flow System</div>
            
            <div class="grid-layout">
                <div class="input-group">
                    <label style="font-size: 9px; color: var(--accent-orange); letter-spacing: 3px; margin-bottom: 10px; display: block; font-weight: bold;">TARGET PLATFORM</label>
                    <select id="platformSelect">
                        <option value="Instagram Reel">Instagram Reel</option>
                        <option value="Facebook Reel">Facebook Reel</option>
                        <option value="YouTube Short">YouTube Short</option>
                        <option value="YouTube Long Video">YouTube Long Video</option>
                        <option value="Enormous fx Ai">Enormous fx Ai</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label style="font-size: 9px; color: var(--accent-blue); letter-spacing: 3px; margin-bottom: 10px; display: block; font-weight: bold;">FLOW LANGUAGE</label>
                    <select id="languageSelect">
                        <option value="Hindi">Hindi (हिंदी)</option>
                        <option value="English">English</option>
                        <option value="French">French (Français)</option>
                        <option value="Chinese">Chinese (中文)</option>
                        <option value="Korean">Korean (한국어)</option>
                        <option value="Spanish">Spanish (Español)</option>
                        <option value="Japanese">Japanese (日本語)</option>
                    </select>
                </div>

                <textarea id="topicInput" placeholder="Feed the Neural Network your concept..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">
                Go Infinity <span class="infinity-symbol" style="font-size: 26px;">∞</span>
            </button>

            <div id="summary-page">
                <div class="summary-header">
                    <span style="font-size: 10px; letter-spacing: 3px; color: var(--accent-blue); font-weight: bold;">NEURAL SUMMARY OUTPUT</span>
                    <button class="copy-btn" id="copy-btn">Copy Script</button>
                </div>
                <div id="output-tab">
                    <div id="scriptOutput">Welcome to Infinity studio made by Pushkar Sanehi</div>
                </div>
            </div>
        </div>

        <div class="creator-tag">EMERGED BY PUSHKAR SANEHI</div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggle-btn').addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        const historyList = document.getElementById('historyList');

        function saveHistory(topic, platform, language, script) {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            h.unshift({ topic, platform, language, script });
            localStorage.setItem('ifs_h', JSON.stringify(h.slice(0, 15)));
            renderH();
        }

        function renderH() {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            historyList.innerHTML = h.map((item, i) => 
                `<div onclick="loadH(${i})" class="history-item">
                    <strong style="display:block; margin-bottom: 5px; color: #fff;">${item.topic.substring(0,25)}...</strong>
                    <span style="font-size:9px; opacity:0.6; color:var(--accent-orange); text-transform: uppercase;">${item.platform}</span> 
                    <span style="font-size:9px; opacity:0.4; margin: 0 5px;">|</span>
                    <span style="font-size:9px; opacity:0.6;">${item.language}</span>
                </div>`).join('');
        }

        window.loadH = (i) => {
            const h = JSON.parse(localStorage.getItem('ifs_h'));
            const item = h[i];
            
            document.getElementById('topicInput').value = item.topic;
            document.getElementById('platformSelect').value = item.platform;
            document.getElementById('languageSelect').value = item.language;
            document.getElementById('scriptOutput').innerText = item.script;
            
            sidebar.classList.add('closed');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        renderH();

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('scriptOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalText = btn.innerText;
                btn.innerText = "COPIED!";
                btn.style.borderColor = "var(--accent-orange)";
                btn.style.color = "var(--accent-orange)";
                setTimeout(() => { 
                    btn.innerText = originalText;
                    btn.style.borderColor = "rgba(0, 229, 255, 0.5)";
                    btn.style.color = "var(--accent-blue)";
                }, 2000);
            });
        });

        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            if (!topic) return;

            const output = document.getElementById('scriptOutput');
            output.innerText = "CONNECTING TO NEURAL NETWORK...";
            
            let dots = 0;
            const loader = setInterval(() => {
                dots = (dots + 1) % 4;
                output.innerText = "INITIATING FLOW" + ".".repeat(dots);
            }, 300);

            try {
                const res = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });
                clearInterval(loader);
                
                const data = await res.json();
                const cleanText = data.script.replace(/[*#]/g, '');
                output.innerText = cleanText;
                
                saveHistory(topic, platform, language, cleanText);
            } catch (e) {
                clearInterval(loader);
                output.innerText = "CRITICAL LINK FAILURE. CHECK CONNECTION.";
                output.style.color = "var(--accent-orange)";
            }
        });
    </script>
</body>
</html>
