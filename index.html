<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #020610;
            --panel-bg: rgba(13, 22, 41, 0.95);
            --accent-blue: #00e5ff;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: rgba(2, 6, 16, 0.98);
            border-right: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            height: 100%;
            z-index: 100;
        }

        #sidebar.closed { transform: translateX(-260px); }

        #toggle-btn {
            position: absolute;
            right: -65px;
            top: 30px;
            background: #0d1629;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 5px 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s;
        }

        /* MAIN PANEL */
        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed to top-aligned for better scrolling */
            padding: 40px;
            overflow-y: auto; 
        }

        #control-panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 20px;
        }

        h1 {
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 30px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-red), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; text-align: left; }
        
        select, textarea {
            width: 100%; background: #0d1629;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; color: #fff; padding: 14px;
            box-sizing: border-box;
        }

        textarea { height: 100px; grid-column: span 2; resize: none; }

        .primary-btn {
            width: 100%; background: transparent; border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 15px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 4px; cursor: pointer;
            transition: 0.3s; font-weight: bold;
        }

        .primary-btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 25px var(--accent-blue); }

        /* DROP-DOWN OUTPUT SECTION */
        #output-tab {
            margin-top: 20px; 
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; 
            padding: 25px; 
            min-height: 150px;
            max-height: 55vh; /* Drops down to cover more than half screen height if needed */
            overflow-y: auto;
            text-align: left;
            transition: all 0.4s ease;
        }

        #scriptOutput {
            font-family: 'Courier New', monospace; 
            color: #00e5ff; 
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: none; border: 1px solid rgba(0, 229, 255, 0.4);
            color: var(--accent-blue); padding: 5px 15px; border-radius: 6px;
            font-size: 10px; letter-spacing: 2px; cursor: pointer;
            float: right; margin-bottom: 10px;
        }

        /* Scrollbar Styling */
        #output-tab::-webkit-scrollbar { width: 6px; }
        #output-tab::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }

        .creator-tag { position: fixed; bottom: 20px; right: 20px; font-size: 9px; color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    <div id="sidebar" class="closed">
        <button id="toggle-btn">ARCHIVE</button>
        <div style="color: var(--accent-blue); letter-spacing: 3px; font-size: 12px; margin-bottom: 20px;">NEURAL MEMORY</div>
        <div id="historyList" style="flex-grow:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,0,0,0.2); cursor:pointer; font-size:9px; margin-top:10px;">PURGE CACHE</button>
    </div>

    <div id="main-container">
        <div id="control-panel">
            <h1>Infinity Studios</h1>
            <div class="subtitle" style="font-size: 10px; letter-spacing: 4px; color: var(--text-sub);">INTELLIGENT FLOW SYSTEM</div>
            
            <div class="grid-layout">
                <select id="platformSelect">
                    <option value="Instagram Reel">Instagram Reel</option>
                    <option value="Facebook Reel">Facebook Reel</option>
                    <option value="YouTube Short">YouTube Short</option>
                    <option value="YouTube Long Video">YouTube Long Video</option>
                </select>
                
                <select id="languageSelect">
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="English">English</option>
                </select>

                <textarea id="topicInput" placeholder="Enter your core concept..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">GO INFINITY ∞</button>

            <div style="margin-top: 35px; text-align: left;">
                <label style="font-size: 9px; letter-spacing: 2px; color: var(--accent-blue);">NEURAL OUTPUT</label>
                <button class="copy-btn" id="copy-btn">COPY SCRIPT</button>
                <div id="output-tab">
                    <div id="scriptOutput">Awaiting initialization...</div>
                </div>
            </div>
        </div>
        <div class="creator-tag">EMERGED BY PUSHKAR SANEHI</div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggle-btn').addEventListener('click', () => sidebar.classList.toggle('closed'));

        function saveHistory(topic, script, platform, language) {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            h.unshift({ topic, script, platform, language });
            localStorage.setItem('ifs_h', JSON.stringify(h.slice(0, 15)));
            renderH();
        }

        function renderH() {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            document.getElementById('historyList').innerHTML = h.map((item, i) => 
                `<div onclick="loadH(${i})" style="padding:12px; border-bottom:1px solid rgba(0,229,255,0.1); font-size:11px; cursor:pointer; color:var(--text-sub);">${item.topic.substring(0,25)}...</div>`
            ).join('');
        }

        // LOAD HISTORY NOW UPDATES PROMPT AND SETTINGS
        window.loadH = (i) => {
            const h = JSON.parse(localStorage.getItem('ifs_h'));
            const data = h[i];
            document.getElementById('topicInput').value = data.topic;
            document.getElementById('platformSelect').value = data.platform;
            document.getElementById('languageSelect').value = data.language;
            document.getElementById('scriptOutput').innerText = data.script;
        };

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('scriptOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "COPY SCRIPT", 2000);
            });
        });

        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            if (!topic) return;

            document.getElementById('scriptOutput').innerText = "GENERATING RESPONSE...";

            try {
                const res = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });
                const data = await res.json();
                const cleanText = data.script.replace(/[*#]/g, '');
                document.getElementById('scriptOutput').innerText = cleanText;
                saveHistory(topic, cleanText, platform, language);
            } catch (e) {
                document.getElementById('scriptOutput').innerText = "CONNECTION ERROR.";
            }
        });

        renderH();
    </script>
</body>
</html>
