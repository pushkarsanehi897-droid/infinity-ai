<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #020610;
            --panel-bg: rgba(13, 22, 41, 0.95);
            --accent-blue: #00e5ff;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- TOGGLE SIDEBAR --- */
        #sidebar {
            width: 260px;
            background: rgba(2, 6, 16, 0.95);
            border-right: 1px solid rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 100;
        }

        #sidebar.closed { transform: translateX(-260px); }

        #toggle-btn {
            position: absolute;
            right: -40px;
            top: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            padding: 10px;
            border-radius: 0 8px 8px 0;
        }

        .history-list {
            margin-top: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            font-size: 11px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            color: var(--text-sub);
        }

        .history-item:hover { color: var(--accent-blue); background: rgba(0,229,255,0.05); }

        /* --- LOGO AREA --- */
        .ifs-logo {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            filter: drop-shadow(0 0 10px var(--accent-red));
        }

        .infinity-symbol {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- MAIN PANEL --- */
        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        #control-panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        
        select, textarea {
            width: 100%; background: #0d1629;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; color: #fff; padding: 12px;
        }

        textarea { height: 100px; grid-column: span 2; resize: none; }

        .primary-btn {
            width: 100%; background: transparent; border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 15px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }

        #scriptOutput {
            margin-top: 20px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 12px; padding: 20px; min-height: 120px;
            font-family: monospace; color: #00e5ff; font-size: 13px;
        }

        .creator-tag {
            position: absolute; bottom: 20px; right: 20px;
            font-size: 9px; letter-spacing: 3px; color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <button id="toggle-btn">M</button>
        <div class="sidebar-brand" style="color: var(--accent-blue); letter-spacing: 2px; font-size: 14px;">NEURAL MEMORY</div>
        <div class="history-list" id="historyList">
            </div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:red; cursor:pointer; font-size:10px;">PURGE ALL</button>
    </div>

    <div id="main-container">
        <div class="ifs-logo">
            <span class="infinity-symbol">∞</span>
        </div>

        <div id="control-panel">
            <h1 style="letter-spacing: 6px; text-transform: uppercase;">Infinity Studios</h1>
            <p style="font-size: 10px; letter-spacing: 3px; color: var(--text-sub); margin-bottom: 30px;">NEURAL CONTENT SYNTHESIS</p>
            
            <div class="grid-layout">
                <select id="platformSelect">
                    <option value="Instagram Reel">Instagram Reel</option>
                    <option value="YouTube Short">YouTube Short</option>
                    <option value="Homework Help">Homework Help</option>
                </select>
                
                <select id="languageSelect">
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="English">English</option>
                </select>

                <textarea id="topicInput" placeholder="Enter topic..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">Synthesize 🚀</button>

            <div id="output-container">
                <div id="scriptOutput">System online.</div>
            </div>
        </div>

        <div class="creator-tag">Emerged by Pushkar Sanehi</div>
    </div>

    <script>
        // Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggle-btn').addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        // History Logic
        const historyList = document.getElementById('historyList');
        function saveToHistory(topic, script) {
            const history = JSON.parse(localStorage.getItem('ifs_history') || '[]');
            history.unshift({ topic, script, date: new Date().toLocaleTimeString() });
            localStorage.setItem('ifs_history', JSON.stringify(history.slice(0, 10)));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('ifs_history') || '[]');
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="showHistory(${index})">
                    <strong>${item.topic.substring(0, 20)}...</strong><br>
                    <small>${item.date}</small>
                </div>
            `).join('');
        }

        window.showHistory = (index) => {
            const history = JSON.parse(localStorage.getItem('ifs_history'));
            document.getElementById('scriptOutput').innerText = history[index].script;
        };

        renderHistory();

        // Synthesis Logic
        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            const scriptOutput = document.getElementById('scriptOutput');

            if (!topic) return;
            scriptOutput.innerText = "Analyzing Neural Pathways...";

            try {
                const response = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });
                const data = await response.json();
                scriptOutput.innerText = data.script;
                saveToHistory(topic, data.script);
            } catch (error) {
                scriptOutput.innerText = "Connection Failed.";
            }
        });
    </script>
</body>
</html>
