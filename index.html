<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS</title>
    <style>
        /* Keeping your beautiful CSS exactly as it was */
        :root { --primary: #38bdf8; --bg: #030712; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 50px; }
        .container { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; }
        button { padding: 15px 30px; background: var(--primary); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; text-align: left; white-space: pre-wrap; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>INFINITY STUDIOS</h1>
        <label>Topic</label>
        <input type="text" id="topic" placeholder="Enter topic...">
        <label>Platform</label>
        <select id="platform">
            <option value="Instagram Reel">Instagram Reel</option>
            <option value="YouTube Short">YouTube Short</option>
        </select>
        <label>Language</label>
        <select id="language">
            <option value="Hindi">Hindi</option>
            <option value="English">English</option>
        </select>
        <br><br>
        <button onclick="generateScript()">Synthesize 🚀</button>
        <div id="output">System ready...</div>
    </div>

    <script>
        async function generateScript() {
            const topic = document.getElementById('topic').value;
            const platform = document.getElementById('platform').value;
            const language = document.getElementById('language').value;
            const outputBox = document.getElementById('output');

            outputBox.innerText = "Neural networks aligning...";

            try {
                // FIXED: Using relative path '/' instead of localhost
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language })
                });
                const data = await response.json();
                outputBox.innerText = data.script;
            } catch (e) {
                outputBox.innerText = "Error: Could not connect to server.";
            }
        }
    </script>
</body>
</html>
