<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #020610;
            --panel-bg: rgba(13, 22, 41, 0.95);
            --accent-blue: #00e5ff;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NEW: DYNAMIC FIRE BACKGROUND (ORANGE & BLUE) */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255, 61, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 229, 255, 0.15) 0%, transparent 40%),
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
            z-index: -2;
            animation: atmospheric-flicker 10s infinite alternate ease-in-out;
        }

        @keyframes atmospheric-flicker {
            0% { filter: brightness(1) hue-rotate(0deg); }
            50% { filter: brightness(1.2) hue-rotate(5deg); }
            100% { filter: brightness(1) hue-rotate(-5deg); }
        }

        /* SIDEBAR SYSTEM */
        #sidebar {
            width: 260px;
            background: rgba(2, 6, 16, 0.98);
            border-right: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            height: 100%;
            z-index: 100;
        }

        #sidebar.closed { transform: translateX(-260px); }

        #toggle-btn {
            position: absolute;
            right: -65px;
            top: 30px;
            background: #0d1629;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 5px 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s;
        }

        #toggle-btn:hover {
            color: #000;
            background: var(--accent-blue);
            box-shadow: 0 0 20px var(--accent-blue);
        }

        /* LOGO DESIGN */
        .ifs-logo {
            position: absolute; top: 20px; right: 30px;
            font-size: 45px; font-weight: bold;
            filter: drop-shadow(0 0 15px var(--accent-red));
        }
        .infinity-symbol {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* MAIN PANEL */
        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        #control-panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1), 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 50px;
            margin-bottom: 50px;
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 30px;
            font-weight: bold;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-red), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
            animation: fire-pulse 4s infinite linear;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 300;
        }

        @keyframes fire-pulse {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 10px rgba(0, 229, 255, 0.5)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 20px rgba(255, 61, 0, 0.7)); }
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; text-align: left; }
        
        select, textarea {
            width: 100%; background: rgba(13, 22, 41, 0.6);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; color: #fff; padding: 14px;
            outline: none; transition: 0.3s;
        }

        select:focus, textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        textarea { height: 110px; grid-column: span 2; resize: none; }

        .primary-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 15px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .primary-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 25px var(--accent-blue);
        }

        #summary-page {
            margin-top: 40px;
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .summary-header {
            padding: 12px 20px;
            background: rgba(0, 229, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
        }

        #output-tab {
            padding: 25px; 
            min-height: 120px;
            max-height: 50vh; 
            overflow-y: auto; 
            text-align: left;
        }

        #scriptOutput {
            font-family: 'Courier New', monospace; 
            color: #00e5ff; 
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        #output-tab::-webkit-scrollbar { width: 6px; }
        #output-tab::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }

        .copy-btn {
            background: none;
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: var(--accent-blue);
            padding: 5px 15px;
            border-radius: 6px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover { background: var(--accent-blue); color: #000; }

        .creator-tag {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 9px; letter-spacing: 3px; color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="sidebar" class="closed">
        <button id="toggle-btn">ARCHIVE</button>
        <div style="color: var(--accent-blue); letter-spacing: 3px; font-size: 12px; margin-bottom: 20px; margin-top: 40px;">NEURAL MEMORY</div>
        <div id="historyList" style="flex-grow:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,0,0,0.4); cursor:pointer; font-size:9px; padding: 10px;">WIPE CACHE</button>
    </div>

    <div id="main-container">
        <div class="ifs-logo"><span class="infinity-symbol">∞</span></div>

        <div id="control-panel">
            <h1>Infinity Studios</h1>
            <div class="subtitle">Intelligent Flow System</div>
            
            <div class="grid-layout">
                <div class="input-group">
                    <label style="font-size: 8px; color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 5px; display: block;">TARGET PLATFORM</label>
                    <select id="platformSelect">
                        <option value="Instagram Reel">Instagram Reel</option>
                        <option value="Facebook Reel">Facebook Reel</option>
                        <option value="YouTube Short">YouTube Short</option>
                        <option value="YouTube Long Video">YouTube Long Video</option>
                        <option value="Homework Help">Homework Help</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label style="font-size: 8px; color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 5px; display: block;">FLOW LANGUAGE</label>
                    <select id="languageSelect">
                        <option value="Hindi">Hindi (हिंदी)</option>
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Japanese">Japanese</option>
                    </select>
                </div>

                <textarea id="topicInput" placeholder="Commence your Infinite Possibilities..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">
                Go Infinity <span class="infinity-symbol" style="font-size: 22px;">∞</span>
            </button>

            <div id="summary-page">
                <div class="summary-header">
                    <span style="font-size: 9px; letter-spacing: 2px; color: var(--accent-blue);">NEURAL SUMMARY OUTPUT</span>
                    <button class="copy-btn" id="copy-btn">Copy Script</button>
                </div>
                <div id="output-tab">
                    <div id="scriptOutput">Welcome to Infinity studio made by Pushkar Sanehi</div>
                </div>
            </div>
        </div>

        <div class="creator-tag">EMERGED BY PUSHKAR SANEHI</div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggle-btn').addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        const historyList = document.getElementById('historyList');
        function saveHistory(topic, script) {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            h.unshift({ topic, script });
            localStorage.setItem('ifs_h', JSON.stringify(h.slice(0, 10)));
            renderH();
        }
        function renderH() {
            const h = JSON.parse(localStorage.getItem('ifs_h') || '[]');
            historyList.innerHTML = h.map((item, i) => `<div onclick="loadH(${i})" style="padding:10px; border-bottom:1px solid #111; font-size:11px; cursor:pointer; color: #b0bec5;">${item.topic.substring(0,20)}...</div>`).join('');
        }
        window.loadH = (i) => {
            const h = JSON.parse(localStorage.getItem('ifs_h'));
            document.getElementById('scriptOutput').innerText = h[i].script;
        };
        renderH();

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('scriptOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalText = btn.innerText;
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            });
        });

        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            if (!topic) return;

            document.getElementById('scriptOutput').innerText = "INITIATING FLOW...";

            try {
                const res = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });
                const data = await res.json();
                const cleanText = data.script.replace(/[*#]/g, '');
                document.getElementById('scriptOutput').innerText = cleanText;
                saveHistory(topic, cleanText);
            } catch (e) {
                document.getElementById('scriptOutput').innerText = "LINK FAILURE.";
            }
        });
    </script>
</body>
</html>
