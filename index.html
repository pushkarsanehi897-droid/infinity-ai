<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #020610;
            --panel-bg: rgba(13, 22, 41, 0.95);
            --accent-blue: #00e5ff;
            --accent-purple: #9c27b0;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', sans-serif;
            --glow-accent: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Grid Background */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2;
        }

        /* Sidebar */
        #sidebar {
            width: 240px;
            background: rgba(2, 6, 16, 0.8);
            border-right: 1px solid rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .sidebar-brand { font-size: 14px; letter-spacing: 3px; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 40px; }
        .sidebar-link { font-size: 12px; color: var(--text-sub); padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .sidebar-link:hover { color: var(--accent-blue); padding-left: 5px; }

        /* Main Dashboard */
        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        #control-panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 300; font-size: 32px; letter-spacing: 6px; margin: 0;
            background: linear-gradient(to right, var(--accent-blue), #fff, var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 30px 0; }
        
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-blue); margin-bottom: 8px; display: block; }
        
        /* THE FIX: Dropdown Visibility */
        select {
            width: 100%; background: #0d1629; /* Solid dark background for options */
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px; color: #ffffff; padding: 14px;
            font-size: 14px; cursor: pointer; appearance: none;
        }

        select option {
            background-color: #0d1629; /* Ensures text is visible on all browsers */
            color: #ffffff;
        }

        textarea {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: #fff; padding: 14px;
            font-size: 14px; height: 100px; grid-column: span 2; resize: none;
        }

        /* Buttons */
        .primary-btn {
            width: 100%; background: transparent; border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 15px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .primary-btn:hover { background: var(--accent-blue); color: #000; box-shadow: var(--glow-accent); }

        /* Output Terminal */
        #scriptOutput {
            margin-top: 20px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 12px; padding: 20px; min-height: 120px;
            max-height: 250px; overflow-y: auto;
            font-family: 'Courier New', monospace; color: #00e5ff; font-size: 13px;
            line-height: 1.6;
        }

        /* THE CREATOR TAG: Bottom Right */
        .creator-tag {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-brand">Infinity AI</div>
        <div class="sidebar-link">Dashboard</div>
        <div class="sidebar-link">Neural Memory</div>
        <div class="sidebar-link">API Settings</div>
    </div>

    <div id="main-container">
        <div id="control-panel">
            <h1>Infinity Studios</h1>
            <p style="font-size: 10px; letter-spacing: 3px; color: var(--text-sub); text-transform: uppercase; margin-top: 5px;">Neural Content Synthesis</p>
            
            <div class="grid-layout">
                <div class="input-group">
                    <label>Deployment Platform</label>
                    <select id="platformSelect">
                        <option value="Instagram Reel">Instagram Reel</option>
                        <option value="Facebook Reel">Facebook Reel</option>
                        <option value="YouTube Short">YouTube Short</option>
                        <option value="YouTube Long Video">YouTube Long Video</option>
                        <option value="Homework Help">Homework Help</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Output Language</label>
                    <select id="languageSelect">
                        <option value="Hindi">Hindi (हिंदी)</option>
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Korean">Korean</option>
                    </select>
                </div>

                <textarea id="topicInput" placeholder="Enter your core concept or question..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">Synthesize 🚀</button>

            <div id="output-container">
                <label style="margin-top: 25px;">Neural Output</label>
                <div id="scriptOutput">System ready.</div>
            </div>
        </div>

        <div class="creator-tag">Emerged by Pushkar Sanehi</div>
    </div>

    <script>
        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            const scriptOutput = document.getElementById('scriptOutput');

            if (!topic) { alert("Input required."); return; }
            scriptOutput.innerText = "Processing...";

            try {
                const response = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });
                const data = await response.json();
                scriptOutput.innerText = data.script;
            } catch (error) {
                scriptOutput.innerText = "Connection Error.";
            }
        });
    </script>
</body>
</html>
