<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY STUDIOS | Neural Storytelling</title>
    <style>
        :root {
            --bg-dark: #020610;
            --panel-bg: rgba(13, 22, 41, 0.95);
            --accent-blue: #00e5ff;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-sub: #b0bec5;
            --font-stack: 'SF Pro Display', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Grid Background */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2;
        }

        /* Sidebar Toggle System */
        #sidebar {
            width: 260px;
            background: rgba(2, 6, 16, 0.95);
            border-right: 1px solid rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 100;
        }

        #sidebar.closed { transform: translateX(-260px); }

        #toggle-btn {
            position: absolute;
            right: -40px;
            top: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            padding: 10px;
            border-radius: 0 8px 8px 0;
            font-weight: bold;
        }

        .history-list {
            margin-top: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            font-size: 11px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            color: var(--text-sub);
            transition: 0.2s;
        }

        .history-item:hover { color: var(--accent-blue); background: rgba(0,229,255,0.05); }

        /* IFS LOGO (Blue/Red Fire) */
        .ifs-logo {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 45px;
            font-weight: bold;
            display: flex;
            align-items: center;
            filter: drop-shadow(0 0 15px rgba(255, 61, 0, 0.4));
        }

        .infinity-symbol {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Control Panel */
        #main-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        #control-panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 { margin: 0; letter-spacing: 6px; text-transform: uppercase; font-weight: 300; font-size: 28px; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        
        select, textarea {
            width: 100%; background: #0d1629;
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px; color: #fff; padding: 14px;
            font-size: 14px;
        }

        textarea { height: 110px; grid-column: span 2; resize: none; }

        .primary-btn {
            width: 100%; background: transparent; border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 15px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.3s;
        }

        .primary-btn:hover { background: var(--accent-blue); color: #000; box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

        /* Output Box */
        #scriptOutput {
            margin-top: 20px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 12px; padding: 20px; min-height: 120px;
            font-family: 'Courier New', monospace; color: #00e5ff; font-size: 13px;
            line-height: 1.6;
        }

        .creator-tag {
            position: absolute; bottom: 20px; right: 20px;
            font-size: 9px; letter-spacing: 3px; color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="sidebar" class="closed">
        <button id="toggle-btn">M</button>
        <div class="sidebar-brand" style="color: var(--accent-blue); letter-spacing: 2px; font-size: 14px; margin-bottom: 20px;">NEURAL MEMORY</div>
        <div class="history-list" id="historyList"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:rgba(255,0,0,0.5); cursor:pointer; font-size:10px; margin-top: 10px;">PURGE CACHE</button>
    </div>

    <div id="main-container">
        <div class="ifs-logo">
            <span class="infinity-symbol">∞</span>
        </div>

        <div id="control-panel">
            <h1>Infinity Studios</h1>
            <p style="font-size: 10px; letter-spacing: 3px; color: var(--text-sub); margin-bottom: 30px;">NEURAL CONTENT SYNTHESIS</p>
            
            <div class="grid-layout">
                <select id="platformSelect">
                    <option value="Instagram Reel">Instagram Reel</option>
                    <option value="Facebook Reel">Facebook Reel</option>
                    <option value="YouTube Short">YouTube Short</option>
                    <option value="YouTube Long Video">YouTube Long Video</option>
                    <option value="Homework Help">Homework Help</option>
                </select>
                
                <select id="languageSelect">
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Korean">Korean</option>
                </select>

                <textarea id="topicInput" placeholder="Enter your creative spark or homework question..."></textarea>
            </div>

            <button class="primary-btn" id="synthesize-btn">Synthesize 🚀</button>

            <div id="output-container">
                <label style="font-size: 10px; letter-spacing: 2px; color: var(--accent-blue); display: block; margin-top: 25px;">NEURAL OUTPUT</label>
                <div id="scriptOutput">Welcome to Infinity studio made by Pushkar Sanehi</div>
            </div>
        </div>

        <div class="creator-tag">Emerged by Pushkar Sanehi</div>
    </div>

    <script>
        // Sidebar Toggle Logic
        const sidebar = document.getElementById('sidebar');
        document.getElementById('toggle-btn').addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        // History Storage Logic
        const historyList = document.getElementById('historyList');
        function saveToHistory(topic, script) {
            const history = JSON.parse(localStorage.getItem('ifs_history') || '[]');
            history.unshift({ topic, script, date: new Date().toLocaleTimeString() });
            localStorage.setItem('ifs_history', JSON.stringify(history.slice(0, 15)));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('ifs_history') || '[]');
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="showHistory(${index})">
                    <strong>${item.topic.substring(0, 20)}...</strong><br>
                    <small style="opacity:0.5">${item.date}</small>
                </div>
            `).join('');
        }

        window.showHistory = (index) => {
            const history = JSON.parse(localStorage.getItem('ifs_history'));
            document.getElementById('scriptOutput').innerText = history[index].script;
        };

        renderHistory();

        // API Connection Logic
        document.getElementById('synthesize-btn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value;
            const platform = document.getElementById('platformSelect').value;
            const language = document.getElementById('languageSelect').value;
            const scriptOutput = document.getElementById('scriptOutput');

            if (!topic) {
                alert("Please enter a concept.");
                return;
            }

            scriptOutput.innerText = "Accessing Neural Core... Synthesizing Content...";

            try {
                const response = await fetch('https://infinity-ai-1.onrender.com/generate', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, platform, language }),
                });

                const data = await response.json();
                scriptOutput.innerText = data.script;
                saveToHistory(topic, data.script);

            } catch (error) {
                scriptOutput.innerText = "Critical Failure: Neural Link Severed. Check server status.";
            }
        });
    </script>
</body>
</html>
